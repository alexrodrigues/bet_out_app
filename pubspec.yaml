  url_launcher: ^6.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  injectable_generator: ^3.0.2
  build_runner: ^2.4.8
  bloc_test: ^10.0.0
  mockito: ^5.4.4
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
