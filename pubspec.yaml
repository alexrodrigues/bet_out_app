publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  http: ^1.1.0
  shared_preferences: ^2.2.2
  provider: ^6.1.2
  injectable: ^3.0.0
  get_it: ^9.2.1
